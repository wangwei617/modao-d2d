<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>交互说明文档 — 墨刀 D2D</title>
  <meta name="description" content="墨刀 AI D2D 端到端产品交互说明文档" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f9fc;
      --surface: #ffffff;
      --border: #e5e9f0;
      --text: #1a202c;
      --text-secondary: #4a5568;
      --text-muted: #718096;
      --accent: #4f6ef7;
      --accent-light: #eef0ff;
      --code-bg: #f7f8fa;
    }

    body {
      font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* Header */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 8px;
      transition: all 0.15s;
      gap: 6px;
    }

    .back-btn:hover {
      background: var(--bg);
      color: var(--text);
    }

    .header-divider {
      width: 1px;
      height: 16px;
      background: var(--border);
    }

    .doc-title-header {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .header-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-light);
      border-radius: 100px;
      padding: 2px 10px;
    }

    /* Layout */
    .layout {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* Loading */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      gap: 16px;
      color: var(--text-muted);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Markdown content */
    #md-content {
      display: none;
    }

    #md-content.loaded {
      display: block;
    }

    .md-body h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
      line-height: 1.3;
    }

    .md-body h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-top: 48px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .md-body h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-top: 32px;
      margin-bottom: 12px;
    }

    .md-body h4 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-secondary);
      margin-top: 24px;
      margin-bottom: 10px;
    }

    .md-body h5 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-top: 20px;
      margin-bottom: 8px;
    }

    .md-body p {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 14px;
      line-height: 1.8;
    }

    .md-body ul, .md-body ol {
      padding-left: 20px;
      margin-bottom: 14px;
    }

    .md-body li {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      line-height: 1.7;
    }

    .md-body strong {
      color: var(--text);
      font-weight: 600;
    }

    .md-body code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 13px;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 1px 6px;
      color: #e3116c;
    }

    .md-body pre {
      background: #1a1d27;
      border-radius: 12px;
      padding: 20px 24px;
      overflow-x: auto;
      margin: 20px 0;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .md-body pre code {
      background: transparent;
      border: none;
      padding: 0;
      color: #e2e8f0;
      font-size: 13px;
      line-height: 1.7;
    }

    .md-body blockquote {
      border-left: 3px solid var(--accent);
      background: var(--accent-light);
      padding: 12px 20px;
      border-radius: 0 10px 10px 0;
      margin: 16px 0;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .md-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 14px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .md-body th {
      background: #f1f3f9;
      padding: 10px 16px;
      font-weight: 600;
      text-align: left;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }

    .md-body td {
      padding: 10px 16px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }

    .md-body tr:last-child td { border-bottom: none; }

    .md-body tr:hover td { background: #fafbfd; }

    .md-body img {
      max-width: 100%;
      border-radius: 12px;
      margin: 16px 0;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .md-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    .md-body a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }

    .md-body a:hover { border-color: var(--accent); }

    .error-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .error-state h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-left">
      <a href="/" class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
        返回首页
      </a>
      <div class="header-divider"></div>
      <span class="doc-title-header">交互说明文档</span>
    </div>
    <span class="header-badge">PRD · 墨刀 D2D</span>
  </header>

  <div class="layout">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在加载文档内容...</p>
    </div>

    <div id="md-content">
      <div class="md-body" id="md-body"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    var isLocalFile = window.location.protocol === 'file:';
    var RAW_URL = isLocalFile ? 'content.md' : '/prd/content.md';
    var IMG_BASE = isLocalFile ? '../assets/images/' : '/assets/images/';

    if (isLocalFile) {
      var backBtn = document.querySelector('.back-btn');
      if (backBtn) backBtn.setAttribute('href', '../index.html');
    }

    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true,
      gfm: true
    });

    async function loadMarkdown() {
      try {
        const res = await fetch(RAW_URL);
        if (!res.ok) throw new Error('Failed to load');
        let text = await res.text();

        // Fix relative image paths
        text = text.replace(/!\[([^\]]*)\]\((?!http)([^)]+)\)/g, (match, alt, src) => {
          // If the src is just "image-3.png", it will extract "image-3.png"
          // We will map it to IMG_BASE + "image-3.png" (e.g. /assets/images/image-3.png)
          var filename = src.split('/').pop();
          return '![' + alt + '](' + IMG_BASE + (isLocalFile ? filename : encodeURIComponent(filename)) + ')';
        });

        document.getElementById('md-body').innerHTML = marked.parse(text);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('md-content').classList.add('loaded');

        // Apply syntax highlighting
        document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
      } catch (err) {
        document.getElementById('loading').innerHTML = `
          <div class="error-state">
            <h2>⚠️ 文档加载失败</h2>
            <p>请稍后刷新重试，或直接查看 <a href="https://github.com/wangwei617/modao-d2d/blob/main/prd%20%26%20design/%E7%AB%AF%E5%88%B0%E7%AB%AF%20PRD.md" target="_blank">GitHub 原始文档</a></p>
          </div>`;
      }
    }

    loadMarkdown();
  </script>
</body>
</html>
