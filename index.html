<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>墨刀 D2D — 端到端产品原型</title>
  <meta name="description" content="墨刀 AI 端到端产品设计与代码生成平台演示入口" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0e16;
      --surface: #141824;
      --surface2: #1c2133;
      --border: rgba(255,255,255,0.07);
      --text: #e8ecf4;
      --text-muted: #7a869a;
      --accent-blue: #4f8ef7;
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-orange: #f59e0b;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(79,142,247,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139,92,246,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 30% at 50% 50%, rgba(16,185,129,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1200px;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 52px;
    }

    /* Header */
    .header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(79,142,247,0.12);
      border: 1px solid rgba(79,142,247,0.25);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-blue);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .logo-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-blue);
      box-shadow: 0 0 8px var(--accent-blue);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.8); }
    }

    .title {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background: linear-gradient(135deg, #e8ecf4 0%, #a0aec0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 400;
      line-height: 1.6;
      max-width: 480px;
    }

    /* Cards — 双入口：墨刀 AI 应用 + 交互说明 */
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 880px;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow: hidden;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      min-height: 240px;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card-demo::before {
      background: radial-gradient(ellipse 100% 100% at 0% 0%, rgba(79,142,247,0.15) 0%, transparent 60%);
    }

    .card-prd::before {
      background: radial-gradient(ellipse 100% 100% at 0% 0%, rgba(139,92,246,0.15) 0%, transparent 60%);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    .card:hover::before { opacity: 1; }

    .card-demo:hover { border-color: rgba(79,142,247,0.4); }
    .card-prd:hover { border-color: rgba(139,92,246,0.4); }

    .card-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }

    .card-demo .card-icon {
      background: linear-gradient(135deg, rgba(79,142,247,0.2), rgba(79,142,247,0.08));
      border: 1px solid rgba(79,142,247,0.3);
    }

    .card-prd .card-icon {
      background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(139,92,246,0.08));
      border: 1px solid rgba(139,92,246,0.3);
    }

    .card-body {
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      z-index: 1;
      flex: 1;
    }

    .card-tag {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .card-demo .card-tag { color: var(--accent-blue); }
    .card-prd .card-tag { color: var(--accent-purple); }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.2;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      font-weight: 400;
    }

    .card-arrow {
      position: absolute;
      bottom: 28px;
      right: 28px;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, background 0.2s ease;
      z-index: 1;
    }

    .card-demo .card-arrow { background: rgba(79,142,247,0.15); color: var(--accent-blue); }
    .card-prd .card-arrow { background: rgba(139,92,246,0.15); color: var(--accent-purple); }

    .card:hover .card-arrow { transform: translate(2px, -2px); }
    .card-demo:hover .card-arrow { background: rgba(79,142,247,0.25); }
    .card-prd:hover .card-arrow { background: rgba(139,92,246,0.25); }

    /* Tags row */
    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .tag-chip {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      background: rgba(255,255,255,0.03);
    }

    /* Footer */
    .footer {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      opacity: 0.6;
    }

    @media (max-width: 640px) {
      .cards { grid-template-columns: 1fr; max-width: none; }
      .card { min-height: 200px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo-badge">
        <span class="logo-dot"></span>
        墨刀 AI · Design to Code
      </div>
      <h1 class="title">墨刀 AI 演示入口</h1>
      <p class="subtitle">选择进入墨刀 AI 应用，或查看交互与需求说明文档</p>
    </header>

    <div class="cards" id="cards">
      <a
        href="/app/"
        class="card card-demo"
        id="ai-home-card-link"
      >
        <div class="card-icon">✨</div>
        <div class="card-body">
          <span class="card-tag">Vite / React</span>
          <h2 class="card-title">墨刀AI<br>首页</h2>
          <p class="card-desc">主应用（Vite，base 为 /app/）：问候、提示词、墨刀工作台。Vercel 与本地构建后均从 /app/ 访问；本机用静态站打开时脚本会改指向开发服。</p>
          <div class="tags">
            <span class="tag-chip">modaoai-0416</span>
            <span class="tag-chip">工作台</span>
            <span class="tag-chip">提示词</span>
          </div>
        </div>
        <div class="card-arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17L17 7M17 7H7M17 7V17"/>
          </svg>
        </div>
      </a>

      <a href="prd/index.html" class="card card-prd" id="prd-card-link">
        <div class="card-icon">📄</div>
        <div class="card-body">
          <span class="card-tag">PRD / UX</span>
          <h2 class="card-title">交互<br>说明文档</h2>
          <p class="card-desc">产品需求与交互说明：功能模块、交互规范与设计稿引用。</p>
          <div class="tags">
            <span class="tag-chip">PRD</span>
            <span class="tag-chip">交互规范</span>
            <span class="tag-chip">设计说明</span>
          </div>
        </div>
        <div class="card-arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17L17 7M17 7H7M17 7V17"/>
          </svg>
        </div>
      </a>
    </div>

    <footer class="footer">墨刀 AI · 演示入口 · 2026</footer>
  </div>

  <script>
    /**
     * 生产 / Vercel：入口页与 app 同域，墨刀 AI 使用 /app/（与 modaoai-0416 的 Vite base 一致，见 build.sh 输出到 vercel-dist/app）。
     * 本机以 file:// 或静态端口打开根 index、且非 Vite 时，改指向本机 Vite：http://localhost:5174/app/（在 modaoai-0416 下 npm run dev）。
     */
    document.addEventListener('DOMContentLoaded', () => {
      const isLocalFile = window.location.protocol === 'file:';
      const h = window.location.hostname;
      const isLocalHost = h === '127.0.0.1' || h === 'localhost';
      const port = window.location.port;
      const onVite = port === '5174' || port === '3000';

      const goVite = isLocalFile || (isLocalHost && !!port && !onVite);
      const ai = document.getElementById('ai-home-card-link');
      if (goVite && ai) {
        ai.href = 'http://localhost:5174/app/';
        ai.removeAttribute('target');
      }
    });
  </script>
</body>
</html>
